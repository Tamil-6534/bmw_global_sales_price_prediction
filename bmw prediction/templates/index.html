<!DOCTYPE html>
<html>
<head>
    <title>BMW Sales Prediction</title>
</head>
<body>

    <h2>BMW Units Sold Prediction</h2>

    <form action="/predict" method="post">
        <label>Dealership Count:</label>
        <input type="number" name="dealership_count" required>
        <br><br>
        <button type="submit">Predict</button>
    </form>

    <h3>{{ prediction_text }}</h3>
    <img src="{{ url_for('static', filename='plot.png') }}" width="500">
</body>
</html>
